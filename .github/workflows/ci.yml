name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Validate package
        run: |
          set -o pipefail
          npm run ci 2>&1 | tee ci-output.log

      - name: Upload validation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-output
          path: ci-output.log
