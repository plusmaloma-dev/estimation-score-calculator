name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Validate package
        run: npm run ci > ci.log 2>&1

      - name: Upload validation log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-log
          path: ci.log
